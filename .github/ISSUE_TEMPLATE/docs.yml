name: Docs
description: README, examples, or API documentation issue.
title: "[DOCS]: "
body:
  - type: input
    id: page
    attributes:
      label: Page or section
      placeholder: README Basic Example
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
    validations:
      required: true

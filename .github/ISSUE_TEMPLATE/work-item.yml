name: Work item
description: Planned package task or maintenance item.
title: "[WORK]: "
body:
  - type: input
    id: summary
    attributes:
      label: Summary line
      description: One sentence describing the task.
      placeholder: Add an exported helper for letter anchor selection.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - React component
        - State machine
        - Eye math
        - CSS
        - Accessibility
        - Tests
        - Docs
        - CI / package maintenance
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Task has clear acceptance criteria.
        - Public API changes are documented.
        - Generated output is not committed.
    validations:
      required: true

name: Bug report
description: Component, state, accessibility, or package bug.
title: "[BUG]: "
body:
  - type: input
    id: summary
    attributes:
      label: Summary line
      description: One sentence describing the bug.
      placeholder: The O pupil escapes its eye bounds on touch devices.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: React 19, Vite, Rsbuild, Next.js, Chrome, Safari
    validations:
      required: true
  - type: textarea
    id: happened
    attributes:
      label: What happened
      placeholder: Describe the visible failure, accessibility issue, or build error.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Render LivingText with ...
        2. Move the pointer to ...
        3. See the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Link a short log if it helps. Do not upload credentials, paid assets, private keys, screenshots with secrets, or huge binaries.
      placeholder: Paste short public logs here, or use SECURITY.md for sensitive details.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Fix is covered by a focused test.
        - Reduced-motion and accessibility behaviour are unchanged.
    validations:
      required: true
